{% extends "base.html" %}

{% block title %}Register New Student{% endblock %}

{% block extra_css %}
<style>
    .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
    }
    
    .card {
        background: var(--bg-card);
        border-radius: var(--border-radius);
        box-shadow: var(--shadow-md);
        margin-bottom: 20px;
        overflow: hidden;
        border: 1px solid var(--border-color);
    }
    
    .card-header {
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        color: white;
        padding: 20px;
        font-size: 1.2rem;
        font-weight: 600;
    }
    
    .card-body {
        padding: 25px;
    }
    
    .form-group {
        margin-bottom: 20px;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: var(--text-primary);
        font-size: 14px;
    }
    
    .form-control {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid var(--border-color);
        border-radius: 8px;
        font-size: 14px;
        transition: all 0.3s;
        background: var(--bg-card);
        color: var(--text-primary);
    }
    
    .form-control:focus {
        border-color: var(--primary);
        outline: none;
        box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
    }
    
    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }
    
    .btn {
        padding: 14px 28px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        font-size: 16px;
    }
    
    .btn-primary {
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        color: white;
        width: 100%;
    }
    
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(67, 97, 238, 0.3);
    }
    
    .btn-success {
        background: linear-gradient(135deg, var(--success), #059669);
        color: white;
    }
    
    .btn-success:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(6, 214, 160, 0.3);
    }
    
    .btn-outline {
        background: transparent;
        border: 2px solid var(--primary);
        color: var(--primary);
        padding: 10px 20px;
    }
    
    .btn-outline:hover {
        background: var(--primary);
        color: white;
    }
    
    .camera-container {
        background: #000;
        border-radius: var(--border-radius);
        padding: 0;
        text-align: center;
        position: relative;
        overflow: hidden;
        aspect-ratio: 4/3;
    }
    
    .camera-canvas {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }
    
    .face-guide {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 200px;
        height: 200px;
        border: 3px solid #ffd166;
        border-radius: 50%;
        pointer-events: none;
        transition: all 0.3s;
        z-index: 10;
    }
    
    .face-guide.good {
        border-color: #06d6a0;
        box-shadow: 0 0 20px rgba(6, 214, 160, 0.5);
    }
    
    .face-guide.bad {
        border-color: #ef476f;
        animation: pulse 0.5s infinite;
    }
    
    @keyframes pulse {
        0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.02); }
    }
    
    .captured-images {
        display: flex;
        gap: 10px;
        margin: 15px 0;
        flex-wrap: wrap;
    }
    
    .captured-image {
        width: 80px;
        height: 80px;
        border-radius: 8px;
        object-fit: cover;
        border: 2px solid var(--primary);
        cursor: pointer;
        transition: transform 0.3s;
    }
    
    .captured-image:hover {
        transform: scale(1.1);
    }
    
    .register-status {
        padding: 12px;
        border-radius: 8px;
        margin: 15px 0;
        text-align: center;
        font-size: 0.9rem;
    }
    
    .register-status.success {
        background: rgba(6, 214, 160, 0.1);
        color: var(--success);
        border: 1px solid var(--success);
    }
    
    .register-status.error {
        background: rgba(239, 71, 111, 0.1);
        color: var(--danger);
        border: 1px solid var(--danger);
    }
    
    .register-status.info {
        background: rgba(67, 97, 238, 0.1);
        color: var(--primary);
        border: 1px solid var(--primary);
    }
    
    .register-status.warning {
        background: rgba(255, 209, 102, 0.1);
        color: var(--warning);
        border: 1px solid var(--warning);
    }
    
    .spinner {
        border: 3px solid var(--border-color);
        border-top: 3px solid var(--primary);
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto;
    }
    
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    
    .camera-controls {
        display: flex;
        gap: 10px;
        margin-top: 15px;
        justify-content: center;
    }
    
    .alert-toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        padding: 12px 20px;
        border-radius: 8px;
        display: none;
        z-index: 1000;
        animation: slideIn 0.3s ease;
    }
    
    .alert-toast.success {
        background: var(--success);
        color: white;
    }
    
    .alert-toast.error {
        background: var(--danger);
        color: white;
    }
    
    @keyframes slideIn {
        from {
            transform: translateX(100%);
            opacity: 0;
        }
        to {
            transform: translateX(0);
            opacity: 1;
        }
    }
    
    .required:after {
        content: " *";
        color: var(--danger);
    }
    
    .text-muted {
        color: var(--text-muted);
        font-size: 12px;
        margin-top: 5px;
    }
    
    hr {
        margin: 25px 0;
        border: 0;
        border-top: 1px solid var(--border-color);
    }
    
    h5 {
        color: var(--primary);
        margin: 25px 0 15px;
        font-size: 1.1rem;
        font-weight: 600;
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <h2 style="color: var(--text-primary); margin-bottom: 30px;"><i class="fas fa-user-plus me-2"></i>Register New Student</h2>

    <div class="row" style="display: grid; grid-template-columns: 2fr 1fr; gap: 25px;">
        <!-- Student Information Form -->
        <div>
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-user-graduate me-2"></i>Student Information
                </div>
                <div class="card-body">
                    <form method="POST" action="{{ url_for('register_student') }}" id="registrationForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="required">Admission Number</label>
                                <input type="text" class="form-control" name="admission_number" id="admission_number" required 
                                       placeholder="e.g., STU2024001">
                            </div>
                            
                            <div class="form-group">
                                <label>Roll Number</label>
                                <input type="text" class="form-control" name="roll_number" 
                                       placeholder="e.g., 101">
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="required">Full Name</label>
                            <input type="text" class="form-control" name="full_name" required 
                                   placeholder="Enter student's full name">
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" class="form-control" name="email" 
                                       placeholder="student@example.com">
                            </div>
                            
                            <div class="form-group">
                                <label>Phone</label>
                                <input type="text" class="form-control" name="phone" 
                                       placeholder="+1234567890">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Class</label>
                                <select class="form-control" name="class_id">
                                    <option value="">Select Class</option>
                                    {% for class in classes %}
                                    <option value="{{ class.id }}">{{ class.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label>Date of Birth</label>
                                <input type="date" class="form-control" name="date_of_birth">
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Gender</label>
                                <select class="form-control" name="gender">
                                    <option value="">Select Gender</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Address</label>
                            <textarea class="form-control" name="address" rows="2" placeholder="Enter full address"></textarea>
                        </div>

                        <hr>

                        <h5><i class="fas fa-users me-2"></i>Parent Information</h5>

                        <div class="form-row">
                            <div class="form-group">
                                <label>Parent Name</label>
                                <input type="text" class="form-control" name="parent_name" 
                                       placeholder="Parent's full name">
                            </div>
                            
                            <div class="form-group">
                                <label>Parent Email</label>
                                <input type="email" class="form-control" name="parent_email" 
                                       placeholder="parent@example.com">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Parent Phone</label>
                            <input type="text" class="form-control" name="parent_phone" 
                                   placeholder="+1234567890">
                        </div>

                        <!-- Hidden fields for face images -->
                        <input type="hidden" id="face_image_1" name="face_image_1">
                        <input type="hidden" id="face_image_2" name="face_image_2">
                        <input type="hidden" id="face_image_3" name="face_image_3">
                    </form>
                </div>
            </div>
        </div>

        <!-- Face Capture Section with Circle Guide -->
        <div>
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-camera me-2"></i>Face Capture
                </div>
                <div class="card-body">
                    <div class="camera-container">
                        <canvas id="registerCanvas" class="camera-canvas" width="640" height="480"></canvas>
                        <div class="face-guide" id="faceGuide"></div>
                    </div>

                    <div class="camera-controls">
                        <button type="button" class="btn btn-outline flex-grow-1" id="startCameraBtn">
                            <i class="fas fa-camera"></i> Start Camera
                        </button>
                        <button type="button" class="btn btn-success flex-grow-1" id="captureBtn" disabled>
                            <i class="fas fa-camera-retro"></i> Capture Face
                        </button>
                        <button type="button" class="btn btn-danger" id="stopCameraBtn" style="display: none;">
                            <i class="fas fa-stop"></i> Stop
                        </button>
                    </div>

                    <div id="captureStatus" class="register-status info">
                        <i class="fas fa-info-circle"></i> Click "Start Camera" to begin face capture
                    </div>

                    <div id="capturedImages" class="captured-images"></div>

                    <hr>

                    <button type="button" class="btn btn-primary" onclick="submitForm()">
                        <i class="fas fa-save"></i> Register Student
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let registerCameraStream = null;
    let registerCameraActive = false;
    let registerAnimationId = null;
    let capturedImages = [];
    let faceDetectionInterval = null;
    let faceGuide = document.getElementById('faceGuide');
    
    // Initialize camera
    async function startCamera() {
        try {
            registerCameraStream = await navigator.mediaDevices.getUserMedia({ 
                video: { 
                    width: { ideal: 640 },
                    height: { ideal: 480 },
                    facingMode: 'user'
                } 
            });
            
            const canvas = document.getElementById('registerCanvas');
            const video = document.createElement('video');
            video.srcObject = registerCameraStream;
            video.playsInline = true;
            video.autoplay = true;
            
            registerCameraActive = true;
            updateCameraFrame(video, canvas);
            
            // Update UI
            document.getElementById('startCameraBtn').style.display = 'none';
            document.getElementById('stopCameraBtn').style.display = 'inline-block';
            document.getElementById('captureBtn').disabled = false;
            document.getElementById('captureStatus').innerHTML = '<i class="fas fa-info-circle"></i> Position face in the circle and click Capture';
            document.getElementById('captureStatus').className = 'register-status info';
            
            // Start face detection
            startFaceDetection();
            
        } catch (err) {
            document.getElementById('captureStatus').innerHTML = '<i class="fas fa-exclamation-circle"></i> Camera error: ' + err.message;
            document.getElementById('captureStatus').className = 'register-status error';
        }
    }
    
    function stopCamera() {
        if (registerCameraStream) {
            registerCameraStream.getTracks().forEach(track => track.stop());
            registerCameraStream = null;
        }
        registerCameraActive = false;
        if (registerAnimationId) cancelAnimationFrame(registerAnimationId);
        if (faceDetectionInterval) clearInterval(faceDetectionInterval);
        
        // Update UI
        document.getElementById('startCameraBtn').style.display = 'inline-block';
        document.getElementById('stopCameraBtn').style.display = 'none';
        document.getElementById('captureBtn').disabled = true;
        document.getElementById('captureStatus').innerHTML = '<i class="fas fa-info-circle"></i> Camera stopped';
        document.getElementById('captureStatus').className = 'register-status info';
        faceGuide.className = 'face-guide';
    }
    
    function updateCameraFrame(video, canvas) {
        if (!registerCameraActive) return;
        if (video.videoWidth > 0) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        }
        registerAnimationId = requestAnimationFrame(() => updateCameraFrame(video, canvas));
    }
    
    function startFaceDetection() {
        const canvas = document.getElementById('registerCanvas');
        
        faceDetectionInterval = setInterval(() => {
            if (!registerCameraActive) return;
            
            const imageData = canvas.toDataURL('image/jpeg', 0.7);
            
            fetch('/api/detect-faces', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: imageData, camera_id: 'register' })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success && data.faces && data.faces.length > 0) {
                    const face = data.faces[0];
                    const faceCenterY = face.center_y;
                    const canvasHeight = canvas.height;
                    const centerY = canvasHeight / 2;
                    
                    // Check if face is centered
                    const isCentered = Math.abs(faceCenterY - centerY) < 80;
                    const isGoodSize = face.rectangle.width > 80 && face.rectangle.height > 80;
                    
                    if (isCentered && isGoodSize) {
                        faceGuide.className = 'face-guide good';
                        document.getElementById('captureStatus').innerHTML = '<i class="fas fa-check-circle"></i> Face detected - Good position! Click Capture';
                        document.getElementById('captureStatus').className = 'register-status success';
                    } else if (!isCentered) {
                        faceGuide.className = 'face-guide bad';
                        document.getElementById('captureStatus').innerHTML = '<i class="fas fa-arrows-alt-v"></i> Move face to center of circle';
                        document.getElementById('captureStatus').className = 'register-status warning';
                    } else if (!isGoodSize) {
                        faceGuide.className = 'face-guide bad';
                        document.getElementById('captureStatus').innerHTML = '<i class="fas fa-search"></i> Move closer to camera';
                        document.getElementById('captureStatus').className = 'register-status warning';
                    }
                } else {
                    faceGuide.className = 'face-guide bad';
                    document.getElementById('captureStatus').innerHTML = '<i class="fas fa-user-slash"></i> No face detected';
                    document.getElementById('captureStatus').className = 'register-status warning';
                }
            })
            .catch(error => {
                console.error('Face detection error:', error);
            });
        }, 500);
    }
    
    async function captureImage() {
        if (capturedImages.length >= 3) {
            showToast('Maximum 3 images already captured', 'error');
            return;
        }
        
        const canvas = document.getElementById('registerCanvas');
        const imageData = canvas.toDataURL('image/jpeg', 0.9);
        
        // First check if face is detected before capturing
        try {
            const response = await fetch('/api/detect-faces', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: imageData, camera_id: 'register' })
            });
            
            const data = await response.json();
            
            if (!data.success || !data.faces || data.faces.length === 0) {
                showToast('No face detected! Please position your face in the circle.', 'error');
                return;
            }
            
            // Check face quality
            const face = data.faces[0];
            const canvasHeight = canvas.height;
            const centerY = canvasHeight / 2;
            const isCentered = Math.abs(face.center_y - centerY) < 80;
            
            if (!isCentered) {
                showToast('Please center your face in the circle', 'error');
                return;
            }
            
        } catch (error) {
            console.error('Error checking face:', error);
        }
        
        capturedImages.push(imageData);
        document.getElementById(`face_image_${capturedImages.length}`).value = imageData;
        
        // Add to displayed images
        const container = document.getElementById('capturedImages');
        const img = document.createElement('img');
        img.src = imageData;
        img.className = 'captured-image';
        img.title = `Capture ${capturedImages.length}`;
        img.onclick = () => {
            if (confirm('Delete this captured image?')) {
                const index = capturedImages.indexOf(imageData);
                if (index > -1) {
                    capturedImages.splice(index, 1);
                    img.remove();
                    for (let i = 1; i <= 3; i++) {
                        document.getElementById(`face_image_${i}`).value = capturedImages[i-1] || '';
                    }
                    showToast('Image removed', 'info');
                }
            }
        };
        container.appendChild(img);
        
        // Update status
        const statusEl = document.getElementById('captureStatus');
        statusEl.innerHTML = `<i class="fas fa-check-circle"></i> Captured ${capturedImages.length}/3 images`;
        statusEl.className = 'register-status success';
        
        if (capturedImages.length >= 3) {
            document.getElementById('captureBtn').disabled = true;
            statusEl.innerHTML = '<i class="fas fa-check-circle"></i> Maximum 3 images captured - You can now register';
            showToast('All 3 images captured! You can now register the student.', 'success');
        } else {
            showToast(`Image ${capturedImages.length} captured successfully!`, 'success');
        }
    }
    
    function submitForm() {
        if (capturedImages.length === 0) {
            showToast('Please capture at least one face image', 'error');
            return;
        }
        
        const admission = document.getElementById('admission_number').value.trim();
        const name = document.querySelector('[name="full_name"]').value.trim();
        
        if (!admission) {
            showToast('Please enter admission number', 'error');
            document.getElementById('admission_number').focus();
            return;
        }
        
        if (!name) {
            showToast('Please enter student name', 'error');
            document.querySelector('[name="full_name"]').focus();
            return;
        }
        
        // Show loading
        const submitBtn = document.querySelector('.btn-primary');
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Registering...';
        submitBtn.disabled = true;
        
        document.getElementById('registrationForm').submit();
    }
    
    function showToast(message, type) {
        const toast = document.createElement('div');
        toast.className = `alert-toast ${type}`;
        toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} me-2"></i> ${message}`;
        document.body.appendChild(toast);
        toast.style.display = 'block';
        
        setTimeout(() => {
            toast.style.display = 'none';
            toast.remove();
        }, 3000);
    }
    
    // Event listeners
    document.getElementById('startCameraBtn').addEventListener('click', startCamera);
    document.getElementById('stopCameraBtn').addEventListener('click', stopCamera);
    document.getElementById('captureBtn').addEventListener('click', captureImage);
    
    // Cleanup on page unload
    window.addEventListener('beforeunload', function() {
        if (registerCameraStream) stopCamera();
    });
</script>
{% endblock %}
